name: Deploy Portfolio to AWS S3

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AKIAQII4Y2VQMNCAK37M }}
          aws-secret-access-key: ${{ secrets.gjWZHR5XAbytprisxod4k8vk/4BktcOsJ7GUZ9jc }}
          aws-region: ap-south-1

      - name: Deploy to S3
        run: |
          aws s3 sync . s3://aakanksha-portfolio-123 --delete
